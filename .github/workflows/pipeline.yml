name: Superkart ML Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r superkart_project/deployment/requirements.txt
          pip install mlflow scikit-learn huggingface_hub pandas numpy

      - name: Create necessary local directories
        run: |
          mkdir -p superkart_project/data
          mkdir -p superkart_project/output
          mkdir -p superkart_project/model

      - name: Run Data Preparation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Running data preparation..."
          python superkart_project/model_building/prep.py || { echo 'Data prep failed'; exit 1; }

      - name: Run Model Training
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Training model..."
          python superkart_project/model_building/train.py

      - name: Upload Streamlit App Files to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Uploading Streamlit app..."
          # Note: The app.py itself handles model loading now, so the model needs to be present.
          # The train.py script already uploads the model to Hugging Face Model Hub.
          # A separate script would typically download the model for deployment,
          # but for simplicity, we'll assume it's copied during the GitHub Actions runner setup.
          python superkart_project/deployment/app.py # This is an incorrect way to deploy to HF Spaces. The actual upload happens below.

      # Corrected step to upload deployment files (app.py, requirements.txt, Dockerfile) to a Hugging Face Space
      - name: Upload Deployment Files to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Uploading deployment files to Hugging Face Space..."
          python -c "from huggingface_hub import HfApi; import os; api = HfApi(token=os.getenv('HF_TOKEN')); space_repo_id = 'Lalithas/superkart';
          api.upload_file(path_or_fileobj='superkart_project/deployment/Dockerfile', path_in_repo='Dockerfile', repo_id=space_repo_id, repo_type='space', token=os.getenv('HF_TOKEN'));
          api.upload_file(path_or_fileobj='superkart_project/deployment/app.py', path_in_repo='app.py', repo_id=space_repo_id, repo_type='space', token=os.getenv('HF_TOKEN'));
          api.upload_file(path_or_fileobj='superkart_project/deployment/requirements.txt', path_in_repo='requirements.txt', repo_id=space_repo_id, repo_type='space', token=os.getenv('HF_TOKEN'));
          print('✅ Deployment files uploaded to Hugging Face Space.')"

      - name: Complete job
        run: echo "✅ All steps finished."
