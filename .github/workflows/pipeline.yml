name: Superkart ML Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r superkart_project/deployment/requirements.txt
          pip install mlflow scikit-learn huggingface_hub pandas numpy

      - name: Create necessary local directories
        run: |
          mkdir -p superkart_project/data
          mkdir -p superkart_project/output

      - name: Run Data Preparation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Running data preparation..."
          python superkart_project/model_building/prep.py || { echo 'Data prep failed'; exit 1; }

      - name: Run Model Training
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Training model..."
          python superkart_project/model_building/train.py

      - name: Upload Streamlit App Files to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Uploading Streamlit app..."
          python superkart_project/deployment/app.py

      - name: Post Set up Python
        run: echo "Pipeline completed successfully."

      - name: Complete job
        run: echo "✅ All steps finished."
