name: Superkart ML Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r superkart_project/deployment/requirements.txt
          pip install mlflow scikit-learn huggingface_hub # Ensure all necessary libraries are installed

      - name: Create necessary local directories
        run: |
          mkdir -p superkart_project/data
          mkdir -p superkart_project/model # For trained model

      - name: Run Data Registration (superkart_data_register.py)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python superkart_project/model_building/superkart_data_register.py

      - name: Run Data Preparation (prep.py - assumed for Superkart)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # This step assumes 'superkart_project/model_building/prep.py' exists and performs data prep.
          # If it doesn't exist or is empty, this will fail.
          python superkart_project/model_building/prep.py

      - name: Run Model Training (train.py - assumed for Superkart)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # This step assumes 'superkart_project/model_building/train.py' exists and performs training and uploads model.
          # If it doesn't exist or is empty, this will fail.
          python superkart_project/model_building/train.py

      - name: Upload Streamlit App Files to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c """
import os
from huggingface_hub import HfApi, create_repo

api = HfApi(token=os.getenv('HF_TOKEN'))
space_repo_id = 'Lalithas/superkart' # Ensure this matches your actual Space ID
model_repo_id = 'Lalithas/Superkart-Prediction-Model'

# Ensure the Hugging Face Space exists
try:
    api.repo_info(repo_id=space_repo_id, repo_type='space')
    print(f'Space {space_repo_id} already exists.')
except Exception:
    create_repo(repo_id=space_repo_id, repo_type='space', private=False, space_sdk='streamlit', space_hardware='cpu-basic', token=os.getenv('HF_TOKEN'))
    print(f'Space {space_repo_id} created successfully.')

# Upload Streamlit app deployment files
deployment_files = [
    'superkart_project/deployment/Dockerfile',
    'superkart_project/deployment/app.py',
    'superkart_project/deployment/requirements.txt'
]

for file_path in deployment_files:
    if os.path.exists(file_path):
        api.upload_file(
            path_or_fileobj=file_path,
            path_in_repo=os.path.basename(file_path),
            repo_id=space_repo_id,
            repo_type='space',
            token=os.getenv('HF_TOKEN')
        )
        print(f'Uploaded {os.path.basename(file_path)} to {space_repo_id}')
    else:
        print(f'Error: File not found for upload to Space: {file_path}. Make sure it\\'s created before this step.')
          """
