name: Superkart ML Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r superkart_project/deployment/requirements.txt
          pip install mlflow scikit-learn huggingface_hub

      - name: Create necessary local directories
        run: |
          mkdir -p superkart_project/data
          mkdir -p superkart_project/model

      # Removed 'Run Data Registration' step as prep.py downloads data from Hugging Face.
      # - name: Run Data Registration
      #   run: python superkart_project/model_building/superkart_data_register.py

      - name: Run Data Preparation
        run: python superkart_project/model_building/prep.py

      - name: Run Model Training
        run: python superkart_project/model_building/train.py

      - name: Upload Streamlit App Files to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi, create_repo

          token = os.getenv("HF_TOKEN")
          api = HfApi(token=token)
          space_repo_id = "Lalithas/superkart"

          # Ensure the Space exists
          try:
              api.repo_info(repo_id=space_repo_id, repo_type="space")
              print(f"Space {space_repo_id} already exists.")
          except Exception:
              create_repo(
                  repo_id=space_repo_id,
                  repo_type="space",
                  private=False,
                  space_sdk="streamlit",
                  space_hardware="cpu-basic",
                  token=token
              )
              print(f"Space {space_repo_id} created successfully.")

          # Upload deployment files
          deployment_files = [
              "superkart_project/deployment/Dockerfile",
              "superkart_project/deployment/app.py",
              "superkart_project/deployment/requirements.txt"
          ]

          for file_path in deployment_files:
              if os.path.exists(file_path):
                  api.upload_file(
                      path_or_fileobj=file_path,
                      path_in_repo=os.path.basename(file_path),
                      repo_id=space_repo_id,
                      repo_type="space",
                      token=token
                  )
                  print(f"Uploaded {os.path.basename(file_path)} to {space_repo_id}")
              else:
                  print(f"Error: File not found for upload: {file_path}")
          EOF
